{% include "helpers/header.html" %}

<tr class="bordered" width="100%">
  <td>
    <p class="text">Hi {{ name }},</p>

    <p class="text">{{ message|safe }}</p>
  </td>
</tr>

<tr>
  {% if image %}
  <td style="text-align: center">
    <img src="{{image}}" style="width: 300px" />
  </td>
  {% endif %}
</tr>

{% if code %}
<tr>
    <td style="text-align: center; padding: 20px 0;">
        <span style="font-size: 28px; font-weight: bold; letter-spacing: 4px; color: #111111;">
            {{ code }}
        </span>
    </td>
</tr>
{% endif %}

{% include "helpers/footer.html" %}
